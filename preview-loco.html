<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Locomotive SVG Preview</title>
<style>
  body {
    margin: 0;
    background: #0f172a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: #e2e8f0;
  }
  h1 { font-size: 1.5rem; margin-bottom: 2rem; font-weight: 300; letter-spacing: 0.1em; }
  .preview-container {
    width: 90vw;
    max-width: 1200px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 2rem;
  }
  img {
    width: 100%;
    height: auto;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1.5rem;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
  }
  .legend-color {
    width: 16px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>
  <h1>ЭЛЕКТРОВОЗ — BLUEPRINT SVG PREVIEW</h1>
  <div class="preview-container">
    <img src="images/loco.svg" alt="Electric Locomotive Blueprint">
    <div class="legend">
      <div class="legend-item"><span class="legend-color" style="background:#475569"></span> Рельсы</div>
      <div class="legend-item"><span class="legend-color" style="background:#94a3b8"></span> Колёса</div>
      <div class="legend-item"><span class="legend-color" style="background:#60a5fa"></span> Кузов</div>
      <div class="legend-item"><span class="legend-color" style="background:#38bdf8"></span> Пантограф</div>
      <div class="legend-item"><span class="legend-color" style="background:#f97316"></span> Трансформатор</div>
      <div class="legend-item"><span class="legend-color" style="background:#22c55e"></span> Тяговые двигатели</div>
      <div class="legend-item"><span class="legend-color" style="background:#eab308"></span> Тормоза</div>
      <div class="legend-item"><span class="legend-color" style="background:#e879f9"></span> Кабины</div>
    </div>
  </div>
</body>
</html>
